name: siancek

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: siancek/laravel-app:1.0
    container_name: siancek-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./laravel-app:/var/www/html
    environment:
      ML_SERVICE_URL: http://ml-service:8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: siancek
      DB_USERNAME: siancek
      DB_PASSWORD: siancek_secret
    depends_on:
      mysql:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - siancek-net

  nginx:
    image: nginx:1.27-alpine
    container_name: siancek-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel-app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - siancek-net

  mysql:
    image: mysql:8.0
    container_name: siancek-mysql
    restart: unless-stopped
    ports:
      # Host 3307 -> container 3306, agar tidak bentrok dengan MySQL lokal
      # (Laragon/standalone) yang biasanya memakai 3306. Service di dalam
      # Docker tetap terhubung lewat jaringan internal "mysql:3306".
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: siancek
      MYSQL_USER: siancek
      MYSQL_PASSWORD: siancek_secret
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - siancek-net

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    image: siancek/ml-service:1.0
    container_name: siancek-ml
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      ML_API_KEY: ${ML_API_KEY:-siancek-dev-key}
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - siancek-net

  redis:
    image: redis:7-alpine
    container_name: siancek-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - siancek-net

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: siancek-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      # Auto-login: tidak perlu ketik user/password
      PMA_USER: siancek
      PMA_PASSWORD: siancek_secret
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - siancek-net

volumes:
  mysql-data:
    driver: local

networks:
  siancek-net:
    driver: bridge
